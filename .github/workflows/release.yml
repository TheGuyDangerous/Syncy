name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.sum

      - name: Build binaries
        working-directory: engine
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA:0:12}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PKG="github.com/TheGuyDangerous/Syncy/engine/internal/buildinfo"
          LDFLAGS="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.Date=${DATE}"

          mkdir -p out ../dist
          build() {
            local goos="$1" goarch="$2" ext="$3"
            local name="syncyd-${VERSION}-${goos}-${goarch}"
            echo "==> ${name}"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "$LDFLAGS" -o "out/syncyd${ext}" ./cmd/syncyd
            if [ "$goos" = "windows" ]; then
              (cd out && zip -q "../../dist/${name}.zip" "syncyd${ext}")
            else
              tar -czf "../dist/${name}.tar.gz" -C out "syncyd${ext}"
            fi
            rm -f "out/syncyd${ext}"
          }

          build linux   amd64 ""
          build linux   arm64 ""
          build darwin  amd64 ""
          build darwin  arm64 ""
          build windows amd64 ".exe"
          build windows arm64 ".exe"

      - name: Checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PRERELEASE=""
          case "$GITHUB_REF_NAME" in
            v0.*|*-*) PRERELEASE="--prerelease" ;;
          esac
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "Syncy $GITHUB_REF_NAME" \
            --generate-notes \
            --notes "Automated build of the Syncy engine daemon (\`syncyd\`) for Windows, macOS and Linux (amd64/arm64). This is an early, work-in-progress pre-release — the desktop and mobile apps and their installers arrive in later milestones." \
            $PRERELEASE
