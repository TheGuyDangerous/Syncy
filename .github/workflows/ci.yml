name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Lightweight repository hygiene — always runs, even before code exists.
  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify required project files exist
        run: |
          set -e
          for f in README.md LICENSE ARCHITECTURE.md CONTRIBUTING.md \
                   SECURITY.md CODE_OF_CONDUCT.md ROADMAP.md CHANGELOG.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done
          echo "All required project files are present."

  # Engine build/test — runs on every OS, but no-ops until engine/go.mod exists.
  engine:
    name: Engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Detect Go module
        id: detect
        shell: bash
        run: |
          if [ -f engine/go.mod ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "engine/go.mod not present yet — skipping Go build/test."
          fi

      - name: Set up Go
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.sum

      - name: Verify formatting
        if: steps.detect.outputs.exists == 'true'
        shell: bash
        run: |
          cd engine
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        if: steps.detect.outputs.exists == 'true'
        run: cd engine && go vet ./...

      - name: Build
        if: steps.detect.outputs.exists == 'true'
        run: cd engine && go build ./...

      - name: Test
        if: steps.detect.outputs.exists == 'true'
        run: cd engine && go test -count=1 ./...

      # The race detector needs cgo and a C toolchain, which is reliably
      # available on the Linux runner; run it there to guard concurrency bugs.
      - name: Test (race detector)
        if: steps.detect.outputs.exists == 'true' && runner.os == 'Linux'
        run: cd engine && CGO_ENABLED=1 go test -race -count=1 ./...

  # Desktop app — compiles the frontend, builds the Go sidecar, and type-checks
  # the Rust shell. Full cross-platform installers are produced in release.yml.
  desktop:
    name: Desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-go@v6
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.sum

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build sidecar
        working-directory: desktop
        run: npm run build:sidecar

      - name: Build frontend
        working-directory: desktop
        run: npm run build

      - name: Check Rust
        working-directory: desktop/src-tauri
        run: cargo check
